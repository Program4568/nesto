<!DOCTYPE html>
<html lang="hr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Social Dilemma</title>

<style>
body{
margin:0;
font-family:Georgia, serif;
background:#050816;
color:white;
padding:20px;
}

h1{
text-align:center;
margin-bottom:15px;
color:#e8e0ff;
}

canvas{
display:block;
margin:0 auto;
background:#0a0a17;
border:1px solid #1e1e3a;
border-radius:16px;
}
</style>
</head>

<body>

<h1>Social Dilemma</h1>

<canvas id="mindmap" width="900" height="500"></canvas>

<script>
const canvas = document.getElementById("mindmap");
const ctx = canvas.getContext("2d");

const cx = canvas.width / 2;
const cy = canvas.height / 2;

const branches = [
"ADDICTION",
"ALGORITHM",
"DATA",
"BEHAVIOR",
"MENTAL HEALTH",
"ENGAGEMENT"
];

function box(x,y,text){
ctx.font="bold 14px Arial";

const w = ctx.measureText(text).width + 24;
const h = 26;

ctx.beginPath();
ctx.roundRect(x-w/2,y-h/2,w,h,8);

ctx.fillStyle="#0f0f20";
ctx.fill();

ctx.strokeStyle="#a78bfa";
ctx.lineWidth=2;
ctx.stroke();

ctx.fillStyle="#a78bfa";
ctx.textAlign="center";
ctx.textBaseline="middle";
ctx.fillText(text,x,y);
}

function draw(){
ctx.clearRect(0,0,canvas.width,canvas.height);

/* center */
ctx.beginPath();
ctx.arc(cx,cy,60,0,Math.PI*2);
ctx.fillStyle="#0ea5e9";
ctx.fill();

ctx.fillStyle="white";
ctx.font="bold 14px Arial";
ctx.textAlign="center";
ctx.textBaseline="middle";
ctx.fillText("Social Dilemma",cx,cy);

/* branches */
const radius = 170;
const step = (Math.PI*2)/branches.length;

branches.forEach((b,i)=>{
const angle = i*step;

const bx = cx + Math.cos(angle)*radius;
const by = cy + Math.sin(angle)*radius;

ctx.beginPath();
ctx.moveTo(cx,cy);
ctx.lineTo(bx,by);
ctx.strokeStyle="#666";
ctx.lineWidth=2;
ctx.stroke();

box(bx,by,b);
});
}

draw();
</script>

</body>
</html>
